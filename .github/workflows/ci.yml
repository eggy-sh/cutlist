name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out cutlist
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }}

      # cutlist depends on the replykit engine, which is not published to PyPI for
      # this portfolio. CI installs it straight from its GitHub source so the build
      # uses the exact engine that ships alongside cutlist. (Local/dev installs the
      # editable sibling checkout instead — see CONTRIBUTING.md. For a published
      # release, drop this step and let the pyproject pin resolve replykit from PyPI.)
      - name: Install replykit (from GitHub source)
        run: uv pip install "replykit @ git+https://github.com/eggy-sh/replykit@main"

      - name: Install cutlist (dev extras)
        run: uv pip install -e '.[dev]'

      - name: Lint (ruff)
        run: |
          .venv/bin/ruff check .
          .venv/bin/ruff format --check .

      - name: Test (pytest + coverage)
        run: .venv/bin/pytest --cov=cutlist --cov-report=term-missing

      - name: Smoke-run the examples (hermetic, no API key)
        run: |
          .venv/bin/python examples/run_cutlist.py
          .venv/bin/cutlist parse examples/notes.txt --json > /dev/null
          .venv/bin/cutlist export examples/notes.txt --format both -o /tmp/ci-review
          # The deliverables must read back through OTIO + the cmx_3600 adapter.
          .venv/bin/python -c "import opentimelineio as otio; otio.adapters.read_from_file('/tmp/ci-review.otio'); otio.adapters.read_from_file('/tmp/ci-review.edl', 'cmx_3600')"
